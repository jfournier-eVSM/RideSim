<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ride Sequence Planner — Pick a Park</title>
<style>
  :root {
    --bg: #0f1420; --panel: #1a2233; --panel2: #222d44;
    --accent: #5cc8ff; --accent2: #ffcc4d; --text: #e6ecf5;
    --muted: #8a98b0; --border: #2c3850;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: radial-gradient(circle at 50% 30%, #16203a 0%, #0d1322 80%);
    color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; padding: 24px;
  }
  h1 { font-size: 22px; margin: 0 0 4px; letter-spacing: .3px; }
  h1 span { color: var(--accent2); }
  p.sub { color: var(--muted); margin: 0 0 28px; }
  .parks { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
  a.park {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    width: 200px; padding: 24px 18px; text-decoration: none; color: var(--text);
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    transition: background .15s, border-color .15s, transform .15s;
  }
  a.park:hover { background: var(--panel2); border-color: var(--accent); transform: translateY(-2px); }
  a.park .emoji { font-size: 40px; line-height: 1; }
  a.park .name { font-size: 16px; font-weight: 600; }
</style>
</head>
<body>
  <h1>🎢 Ride Sequence <span>Planner</span></h1>
  <p class="sub">Choose a park to plan your day.</p>
  <div class="parks" id="parks"></div>
  <script>
    // Add a park: drop a folder under parks/ and add an entry here.
    const PARKS = [
      { slug: "magic-kingdom", name: "Magic Kingdom", emoji: "🏰" }
    ];
    document.getElementById("parks").innerHTML = PARKS.map(p =>
      '<a class="park" href="parks/' + p.slug + '/">' +
        '<span class="emoji">' + p.emoji + '</span>' +
        '<span class="name">' + p.name + '</span>' +
      '</a>'
    ).join("");
  </script>
</body>
</html>
